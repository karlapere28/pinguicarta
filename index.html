<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pingüi-Carta Virtual 2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Fredoka', sans-serif;
            overflow: hidden;
            transition: background 2s ease;
        }

        /* FONDOS DÍA Y NOCHE */
       .escena {
            position: fixed;
            width: 100vw;
            height: 100vh;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
       .escena.activa { display: flex; }

        #escena1 {
            background: linear-gradient(to bottom, #a8d8ea 0%, #e0f6ff 60%, #ffffff 100%);
        }
        #escena1.noche {
            background: linear-gradient(to bottom, #0c1445 0%, #1a237e 60%, #0d47a1 100%);
        }

        /* NIEVE/ESTRELLAS */
       .particulas {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
       .nieve {
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            animation: caer 10s linear infinite;
        }
       .estrella {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: titilar 3s ease-in-out infinite;
        }
        @keyframes caer {
            from { transform: translateY(-10vh); opacity: 1; }
            to { transform: translateY(110vh); opacity: 0; }
        }
        @keyframes titilar {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 1; }
        }

        /* PINGÜINO CAMINANDO */
        #pinguino-entrega {
            position: absolute;
            bottom: 20%;
            left: -100px;
            width: 80px;
            height: 100px;
            animation: caminar 4s ease-out forwards;
        }
        @keyframes caminar {
            to { left: calc(50% - 40px); }
        }
       .pinguino {
            width: 80px;
            height: 100px;
            background: #2c3e50;
            border-radius: 50% 50% 40% 40%;
            position: relative;
        }
       .pinguino::before {
            content: '';
            position: absolute;
            width: 50px;
            height: 60px;
            background: white;
            border-radius: 50%;
            top: 30px;
            left: 15px;
        }
       .pico {
            position: absolute;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 12px solid #f39c12;
            top: 25px;
            left: 32px;
        }
       .mochila {
            position: absolute;
            width: 25px;
            height: 30px;
            background: #e74c3c;
            border-radius: 5px;
            right: -5px;
            top: 35px;
        }

        /* SOBRE */
       .sobre {
            width: 200px;
            height: 120px;
            background: #f8f4e8;
            border: 2px solid #d4c5a9;
            border-radius: 5px;
            position: absolute;
            bottom: 35%;
            left: 50%;
            transform: translateX(-50%) scale(0);
            animation: aparecerSobre 1s 4s forwards;
            cursor: pointer;
            transition: transform 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
       .sobre:hover { transform: translateX(-50%) scale(1.05); }
        @keyframes aparecerSobre {
            to { transform: translateX(-50%) scale(1); }
        }
       .sobre::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(135deg, transparent 50%, #d4c5a9 50%);
            clip-path: polygon(0 0, 100% 0, 50% 100%);
        }

        /* FORMULARIO SOBRE */
       .form-sobre {
            background: rgba(255,255,255,0.95);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: none;
        }
       .form-sobre.activo { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #a8d8ea;
            border-radius: 10px;
            font-family: 'Fredoka', sans-serif;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover { transform: scale(1.02); }

        /* ESCENA DE CARGA */
        #escena2 { background: #a8d8ea; }
       .pinguinos-carga {
            display: flex;
            gap: 100px;
        }
       .pinguino-slide {
            animation: deslizar 2s ease-in-out infinite;
        }
       .pinguino-slide:nth-child(2) { animation-delay: 0.5s; }
        @keyframes deslizar {
            0%, 100% { transform: translateX(-50px); }
            50% { transform: translateX(50px); }
        }

        /* HOJA VINTAGE */
        #escena3 {
            background: #a8d8ea;
            padding: 20px;
            overflow-y: auto;
        }
       .hoja-vintage {
            background: #f4e4c1;
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 31px, #d4c5a9 31px, #d4c5a9 32px),
                url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9"/></filter><rect width="100" height="100" filter="url(%23noise)" opacity="0.1"/></svg>');
            padding: 40px;
            border-radius: 5px;
            box-shadow: 0 0 50px rgba(0,0,0,0.3), inset 0 0 100px rgba(139,69,19,0.1);
            max-width: 700px;
            width: 100%;
            position: relative;
            animation: abrirHoja 1s ease-out;
        }
        @keyframes abrirHoja {
            from { transform: rotateX(90deg); opacity: 0; }
            to { transform: rotateX(0); opacity: 1; }
        }
       .hoja-vintage.cerrando {
            animation: cerrarHoja 1s ease-in forwards;
        }
        @keyframes cerrarHoja {
            to { transform: rotateX(90deg) scale(0.8); opacity: 0; }
        }

        /* CUPONES */
       .cupones {
            display: flex;
            gap: 15px;
            margin: 20px 0;
        }
       .cupon {
            flex: 1;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 15px;
            border-radius: 10px;
            color: white;
            border: 2px dashed white;
        }
       .cupon input {
            background: rgba(255,255,255,0.3);
            border: 1px solid white;
            color: white;
            margin: 5px 0;
        }
       .cupon input::placeholder { color: rgba(255,255,255,0.8); }

        /* CANVAS DIBUJO */
        #canvas-dibujo {
            border: 2px dashed #8b7355;
            background: rgba(255,255,255,0.5);
            cursor: crosshair;
            display: block;
            margin: 15px 0;
            border-radius: 5px;
        }
       .colores {
            display: flex;
            gap: 10px;
            margin: 10px 0;
        }
       .color-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 3px solid #8b7355;
            cursor: pointer;
        }

        /* ESCENA FINAL NOCHE */
        #escena4 {
            background: linear-gradient(to bottom, #0c1445 0%, #1a237e 100%);
        }
       .fogata {
            position: absolute;
            bottom: 10%;
            width: 60px;
            height: 80px;
        }
       .fuego {
            width: 40px;
            height: 60px;
            background: radial-gradient(ellipse at bottom, #ff6b35 0%, #f7931e 40%, transparent 70%);
            margin: 0 auto;
            animation: fuego 1s ease-in-out infinite alternate;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
        }
        @keyframes fuego {
            from { transform: scaleY(1); }
            to { transform: scaleY(1.2); }
        }
       .troncos {
            width: 60px;
            height: 10px;
            background: #4a2c17;
            position: absolute;
            bottom: 0;
            border-radius: 5px;
        }
       .troncos:nth-child(2) { transform: rotate(45deg); }
       .troncos:nth-child(3) { transform: rotate(-45deg); }

       .pinguinos-fogata {
            position: absolute;
            bottom: 15%;
            display: flex;
            gap: 80px;
        }

       .mensaje-final {
            position: absolute;
            top: 20%;
            text-align: center;
            color: white;
            font-size: 24px;
            animation: fadeIn 2s 1s both;
        }

        h1, h2, h3 { color: #2c3e50; margin-bottom: 15px; }
        label { display: block; color: #5a6c7d; font-weight: 600; margin-top: 15px; }
    </style>
</head>
<body>
    <!-- ESCENA 1: ENTREGA -->
    <div id="escena1" class="escena activa">
        <div class="particulas" id="particulas1"></div>
        <div id="pinguino-entrega">
            <div class="pinguino">
                <div class="pico"></div>
                <div class="mochila"></div>
            </div>
        </div>
        <div class="sobre" id="sobre" onclick="abrirSobre()"></div>
        <div class="form-sobre" id="formSobre">
            <h2>🐧 ¿Para quién es esta carta?</h2>
            <input type="text" id="de" placeholder="De: Tu nombre">
            <input type="text" id="para" placeholder="Para: Nombre de tu persona especial">
            <button onclick="iniciarCarga()">Empezar mi Pingüi-Carta ✨</button>
        </div>
    </div>

    <!-- ESCENA 2: CARGA -->
    <div id="escena2" class="escena">
        <h2 style="color: white; margin-bottom: 50px;">Preparando tu carta...</h2>
        <div class="pinguinos-carga">
            <div class="pinguino pinguino-slide">
                <div class="pico"></div>
            </div>
            <div class="pinguino pinguino-slide">
                <div class="pico"></div>
            </div>
        </div>
    </div>

    <!-- ESCENA 3: CREAR CARTA -->
    <div id="escena3" class="escena">
        <div class="hoja-vintage" id="hojaVintage">
            <h1>📜 Mi Pingüi-Carta</h1>
            <p style="color: #8b7355; margin-bottom: 20px;">
                <strong>De:</strong> <span id="mostrarDe"></span> |
                <strong>Para:</strong> <span id="mostrarPara"></span>
            </p>

            <label>✍️ Tu mensaje:</label>
            <textarea id="mensaje" rows="4" placeholder="Escribe algo bonito..."></textarea>

            <label>🖼️ Link de imagen:</label>
            <input type="url" id="imagen" placeholder="https://ejemplo.com/foto.jpg">

            <label>🎵 Link de canción (YouTube, Spotify, MP3):</label>
            <input type="url" id="musica" placeholder="https://...">

            <label>📍 Link del lugar desde donde envías:</label>
            <input type="url" id="ubicacion" placeholder="https://maps.google.com/...">

            <h3>🎟️ Cupones Especiales</h3>
            <div class="cupones">
                <div class="cupon">
                    <input type="text" id="cupon1" placeholder="Vale por...">
                </div>
                <div class="cupon">
                    <input type="text" id="cupon2" placeholder="Cupón para...">
                </div>
            </div>

            <label>🎨 Firma o dibuja algo:</label>
            <canvas id="canvas-dibujo" width="600" height="200"></canvas>
            <div class="colores">
                <div class="color-btn" style="background: #2c3e50;" onclick="cambiarColor('#2c3e50')"></div>
                <div class="color-btn" style="background: #e74c3c;" onclick="cambiarColor('#e74c3c')"></div>
                <div class="color-btn" style="background: #3498db;" onclick="cambiarColor('#3498db')"></div>
                <div class="color-btn" style="background: #2ecc71;" onclick="cambiarColor('#2ecc71')"></div>
                <button onclick="limpiarCanvas()" style="width: auto; padding: 10px 20px;">🗑️</button>
            </div>

            <button onclick="enviarCarta()">✨ Cerrar y Enviar Carta ✨</button>
        </div>
    </div>

    <!-- ESCENA 4: FINAL NOCHE -->
    <div id="escena4" class="escena">
        <div class="particulas" id="particulas4"></div>
        <div class="mensaje-final">
            <h2>Tu Pingüi-Carta fue entregada ❤️</h2>
            <p id="linkFinal" style="margin-top: 20px; font-size: 16px;"></p>
            <button onclick="location.reload()" style="width: auto; margin-top: 20px;">Crear otra carta</button>
        </div>
        <div class="pinguinos-fogata">
            <div class="pinguino" style="transform: scale(0.8);">
                <div class="pico"></div>
            </div>
            <div class="pinguino" style="transform: scale(0.8);">
                <div class="pico"></div>
            </div>
        </div>
        <div class="fogata">
            <div class="troncos"></div>
            <div class="troncos"></div>
            <div class="troncos"></div>
            <div class="fuego"></div>
        </div>
    </div>

    <script>
        // Crear nieve
        for(let i = 0; i < 50; i++) {
            const nieve = document.createElement('div');
            nieve.className = 'nieve';
            nieve.style.left = Math.random() * 100 + '%';
            nieve.style.animationDelay = Math.random() * 10 + 's';
            nieve.style.animationDuration = (Math.random() * 5 + 5) + 's';
            document.getElementById('particulas1').appendChild(nieve);
        }

        function abrirSobre() {
            document.getElementById('sobre').style.display = 'none';
            document.getElementById('formSobre').classList.add('activo');
        }

        function iniciarCarga() {
            const de = document.getElementById('de').value || 'Alguien especial';
            const para = document.getElementById('para').value || 'Tú';
            document.getElementById('mostrarDe').textContent = de;
            document.getElementById('mostrarPara').textContent = para;

            document.getElementById('escena1').classList.remove('activa');
            document.getElementById('escena2').classList.add('activa');

            setTimeout(() => {
                document.getElementById('escena2').classList.remove('activa');
                document.getElementById('escena3').classList.add('activa');
            }, 3000);
        }

        // Canvas dibujo
        const canvas = document.getElementById('canvas-dibujo');
        const ctx = canvas.getContext('2d');
        let dibujando = false;
        let colorActual = '#2c3e50';

        canvas.addEventListener('mousedown', () => dibujando = true);
        canvas.addEventListener('mouseup', () => dibujando = false);
        canvas.addEventListener('mousemove', dibujar);
        canvas.addEventListener('touchstart', (e) => { dibujando = true; e.preventDefault(); });
        canvas.addEventListener('touchend', () => dibujando = false);
        canvas.addEventListener('touchmove', (e) => { dibujar(e.touches[0]); e.preventDefault(); });

        function dibujar(e) {
            if (!dibujando) return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX || e.pageX) - rect.left;
            const y = (e.clientY || e.pageY) - rect.top;
            ctx.fillStyle = colorActual;
            ctx.beginPath();
            ctx.arc(x, y, 3, 0, Math.PI * 2);
            ctx.fill();
        }

        function cambiarColor(color) {
            colorActual = color;
        }

        function limpiarCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function enviarCarta() {
            // Guardar datos
            const datos = {
                de: document.getElementById('de').value,
                para: document.getElementById('para').value,
                mensaje: document.getElementById('mensaje').value,
                imagen: document.getElementById('imagen').value,
                musica: document.getElementById('musica').value,
                ubicacion: document.getElementById('ubicacion').value,
                cupon1: document.getElementById('cupon1').value,
                cupon2: document.getElementById('cupon2').value,
                dibujo: canvas.toDataURL()
            };

            // Animación cerrar hoja
            document.getElementById('hojaVintage').classList.add('cerrando');

            setTimeout(() => {
                // Cambiar a noche
                document.getElementById('escena3').classList.remove('activa');
                document.getElementById('escena4').classList.add('activa');

                // Crear estrellas
                for(let i = 0; i < 100; i++) {
                    const estrella = document.createElement('div');
                    estrella.className = 'estrella';
                    estrella.style.left = Math.random() * 100 + '%';
                    estrella.style.top = Math.random() * 60 + '%';
                    estrella.style.animationDelay = Math.random() * 3 + 's';
                    document.getElementById('particulas4').appendChild(estrella);
                }

                // Generar link con datos codificados
                const link = window.location.origin + window.location.pathname + '#' + btoa(JSON.stringify(datos));
                document.getElementById('linkFinal').innerHTML = `
                    Comparte este link:<br>
                    <input type="text" value="${link}" readonly style="margin-top: 10px; text-align: center;">
                    <button onclick="navigator.clipboard.writeText('${link}')" style="margin-top: 10px;">📋 Copiar Link</button>
                `;
            }, 1000);
        }

        // Si hay datos en el URL, mostrar la carta recibida
        window.onload = function() {
            if (window.location.hash) {
                try {
                    const datos = JSON.parse(atob(window.location.hash.substring(1)));
                    // Aquí podrías mostrar una versión de "carta recibida" con animación
                    alert(`💌 Tienes una Pingüi-Carta de ${datos.de} para ${datos.para}!\n\n${datos.mensaje}`);
                } catch(e) {}
            }
        }
    </script>
</body>
</html>
