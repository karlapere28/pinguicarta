<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pingüi-Carta 3.0 💙</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Fredoka', sans-serif; overflow-x: hidden; }
        
        /* Fondo auroras + montañas + mar */
       .aurora-bg {
            background: linear-gradient(to bottom, #0f172a 0%, #1e1b4b 20%, #312e81 40%, #1e3a8a 60%, #0c4a6e 80%, #164e63 100%);
            position: relative;
            overflow: hidden;
        }
       .aurora {
            position: absolute;
            width: 200%;
            height: 60%;
            top: 0;
            background: linear-gradient(90deg, transparent, #22d3ee, #a855f7, #ec4899, transparent);
            opacity: 0.3;
            filter: blur(60px);
            animation: aurora 8s ease-in-out infinite;
        }
        @keyframes aurora {
            0%, 100% { transform: translateX(-50%) skewX(-15deg); }
            50% { transform: translateX(0%) skewX(15deg); }
        }
        
       .montanas {
            position: absolute;
            bottom: 15%;
            width: 100%;
            height: 30%;
            background: #1e293b;
            clip-path: polygon(0% 100%, 10% 60%, 20% 80%, 30% 40%, 40% 70%, 50% 30%, 60% 60%, 70% 45%, 80% 75%, 90% 50%, 100% 70%, 100% 100%);
        }
       .mar {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 20%;
            background: linear-gradient(to bottom, #0e7490, #155e75);
        }
        
        /* Pingüino caricaturizado */
       .pinguino-kawaii {
            animation: bounce 2s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
       .carta-pagina {
            background: #fef9f3;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            min-height: 500px;
        }
        
        #canvas {
            border: 3px dashed #94a3b8;
            border-radius: 12px;
            cursor: crosshair;
            touch-action: none;
        }
        
       .fogata {
            animation: flame 1s ease-in-out infinite alternate;
        }
        @keyframes flame {
            0% { transform: scale(1) rotate(-2deg); }
            100% { transform: scale(1.1) rotate(2deg); }
        }
    </style>
</head>
<body class="aurora-bg min-h-screen">
    <!-- Auroras -->
    <div class="aurora"></div>
    <div class="aurora" style="animation-delay: -4s; opacity: 0.2;"></div>
    <div class="montanas"></div>
    <div class="mar"></div>

    <!-- PANTALLA 1: Inicio -->
    <div id="pantalla1" class="relative z-10 min-h-screen flex items-center justify-center p-4">
        <div class="bg-white/95 backdrop-blur rounded-3xl p-8 max-w-md w-full shadow-2xl">
            <div class="text-center mb-6">
                <svg class="pinguino-kawaii w-24 h-24 mx-auto mb-4" viewBox="0 0 100 100">
                    <!-- Pingüino kawaii -->
                    <ellipse cx="50" cy="60" rx="25" ry="35" fill="#1e293b"/>
                    <ellipse cx="50" cy="65" rx="18" ry="25" fill="white"/>
                    <circle cx="42" cy="45" r="5" fill="white"/>
                    <circle cx="58" cy="45" r="5" fill="white"/>
                    <circle cx="42" cy="45" r="2" fill="#1e293b"/>
                    <circle cx="58" cy="45" r="2" fill="#1e293b"/>
                    <polygon points="50,50 46,55 54,55" fill="#f97316"/>
                    <ellipse cx="35" cy="60" rx="6" ry="12" fill="#1e293b" transform="rotate(-20 35 60)"/>
                    <ellipse cx="65" cy="60" rx="6" ry="12" fill="#1e293b" transform="rotate(20 65 60)"/>
                </svg>
                <h1 class="text-3xl font-bold text-slate-800 mb-2">Pingüi-Carta 3.0 💙</h1>
            </div>
            <input id="deNombre" placeholder="De: Tu nombre" class="w-full p-4 mb-3 rounded-xl border-2 border-slate-200 text-lg">
            <input id="paraNombre" placeholder="Para: Tu persona especial" class="w-full p-4 mb-4 rounded-xl border-2 border-slate-200 text-lg">
            <button onclick="abrirCarta()" class="w-full bg-gradient-to-r from-blue-500 to-purple-600 text-white p-4 rounded-xl font-bold text-lg hover:scale-105 transition">
                Empezar mi Pingüi-Carta ✨
            </button>
        </div>
    </div>

    <!-- PANTALLA 2: Carta con 2 páginas -->
    <div id="pantalla2" class="hidden relative z-10 min-h-screen p-4">
        <div class="max-w-4xl mx-auto">
            <!-- Navegación páginas -->
            <div class="flex justify-center gap-4 mb-4">
                <button onclick="mostrarPagina(1)" id="btnPag1" class="px-6 py-2 bg-white rounded-full font-bold shadow-lg">Página 1</button>
                <button onclick="mostrarPagina(2)" id="btnPag2" class="px-6 py-2 bg-white/50 rounded-full font-bold">Página 2</button>
            </div>

            <!-- PÁGINA 1: Mensaje + Canción -->
            <div id="pagina1" class="carta-pagina rounded-3xl p-8">
                <h2 class="text-2xl font-bold mb-4 text-slate-800">Para: <span id="nombreDestino"></span> 💙</h2>
                <textarea id="mensaje" placeholder="Escribe tu mensaje aquí..." class="w-full h-64 p-4 border-2 border-slate-200 rounded-xl mb-4 text-lg" ></textarea>
                <div class="mb-4">
                    <label class="font-bold text-slate-700 mb-2 block">🎵 Agrega una canción:</label>
                    <input id="linkCancion" placeholder="Pega link de Spotify o YouTube" class="w-full p-3 border-2 border-slate-200 rounded-xl">
                    <div id="playerCancion" class="mt-3"></div>
                </div>
                <p class="text-right text-slate-600 mt-6">Con cariño, <span id="nombreRemitente"></span> 🐧</p>
            </div>

            <!-- PÁGINA 2: Cupones + Mapa + Dibujo -->
            <div id="pagina2" class="hidden carta-pagina rounded-3xl p-8">
                <h3 class="text-xl font-bold mb-4">🎟️ Cupones para ti</h3>
                <div class="grid md:grid-cols-2 gap-4 mb-6">
                    <div class="bg-pink-100 p-4 rounded-xl border-2 border-dashed border-pink-300">
                        <input placeholder="Cupón #1: Ej. Una cena" class="w-full p-2 rounded mb-2">
                        <textarea placeholder="Descripción" class="w-full p-2 rounded text-sm" rows="2"></textarea>
                    </div>
                    <div class="bg-blue-100 p-4 rounded-xl border-2 border-dashed border-blue-300">
                        <input placeholder="Cupón #2: Ej. Película juntos" class="w-full p-2 rounded mb-2">
                        <textarea placeholder="Descripción" class="w-full p-2 rounded text-sm" rows="2"></textarea>
                    </div>
                </div>

                <h3 class="text-xl font-bold mb-4">📍 Nuestra distancia</h3>
                <div id="mapa" class="h-48 rounded-xl mb-4 bg-slate-200"></div>
                <p class="text-center mb-6 font-bold text-purple-600" id="distanciaTexto">Haz click en 2 puntos del mapa</p>

                <h3 class="text-xl font-bold mb-4">🎨 Dibuja algo para mí</h3>
                <canvas id="canvas" width="700" height="300" class="w-full bg-white"></canvas>
                <button onclick="limpiarCanvas()" class="mt-2 px-4 py-2 bg-red-500 text-white rounded-lg">Limpiar dibujo</button>
            </div>

            <div class="flex justify-center gap-4 mt-6">
                <button onclick="cerrarCarta()" class="px-8 py-3 bg-gradient-to-r from-purple-500 to-pink-600 text-white rounded-xl font-bold text-lg hover:scale-105 transition">
                    Cerrar Carta 💌
                </button>
            </div>
        </div>
    </div>

    <!-- PANTALLA 3: Final con fogata -->
    <div id="pantalla3" class="hidden relative z-10 min-h-screen flex items-center justify-center p-4">
        <div class="text-center">
            <h2 class="text-4xl font-bold text-white mb-8">¡Carta entregada! 💙</h2>
            <!-- Escena fogata con pingüinos -->
            <svg viewBox="0 0 400 300" class="w-full max-w-2xl mx-auto mb-8">
                <!-- Pinos -->
                <polygon points="50,200 70,100 90,200" fill="#065f46"/>
                <polygon points="320,200 340,80 360,200" fill="#065f46"/>
                <polygon points="100,220 120,120 140,220" fill="#047857"/>
                <!-- Fogata -->
                <ellipse cx="200" cy="230" rx="40" ry="10" fill="#451a03" opacity="0.5"/>
                <g class="fogata">
                    <polygon points="200,230 190,200 210,200" fill="#f97316"/>
                    <polygon points="200,220 185,195 215,195" fill="#fbbf24"/>
                    <polygon points="200,215 192,190 208,190" fill="#fef08a"/>
                </g>
                <!-- Pingüino con guitarra -->
                <g transform="translate(150, 180)">
                    <ellipse cx="0" cy="20" rx="18" ry="28" fill="#1e293b"/>
                    <ellipse cx="0" cy="25" rx="12" ry="20" fill="white"/>
                    <circle cx="-5" cy="5" r="4" fill="white"/>
                    <circle cx="5" cy="5" r="4" fill="white"/>
                    <circle cx="-5" cy="5" r="1.5" fill="#1e293b"/>
                    <circle cx="5" cy="5" r="1.5" fill="#1e293b"/>
                    <polygon points="0,10 -3,14 3,14" fill="#f97316"/>
                    <rect x="10" y="15" width="8" height="25" rx="4" fill="#92400e"/>
                    <circle cx="14" cy="12" r="6" fill="#a16207"/>
                </g>
                <!-- Pingüino con pescado -->
                <g transform="translate(250, 180)">
                    <ellipse cx="0" cy="20" rx="18" ry="28" fill="#1e293b"/>
                    <ellipse cx="0" cy="25" rx="12" ry="20" fill="white"/>
                    <circle cx="-5" cy="5" r="4" fill="white"/>
                    <circle cx="5" cy="5" r="4" fill="white"/>
                    <circle cx="-5" cy="5" r="1.5" fill="#1e293b"/>
                    <circle cx="5" cy="5" r="1.5" fill="#1e293b"/>
                    <polygon points="0,10 -3,14 3,14" fill="#f97316"/>
                    <g transform="translate(15, 25) rotate(-30)">
                        <ellipse cx="0" cy="0" rx="12" ry="6" fill="#94a3b8"/>
                        <polygon points="12,0 18,-4 18,4" fill="#94a3b8"/>
                        <circle cx="-6" cy="0" r="1" fill="#1e293b"/>
                    </g>
                </g>
            </svg>
            <div class="flex justify-center gap-4">
                <button onclick="compartirLink()" class="px-8 py-4 bg-blue-500 text-white rounded-xl font-bold text-lg hover:scale-105 transition">
                    🔗 Compartir Link
                </button>
                <button onclick="location.reload()" class="px-8 py-4 bg-purple-500 text-white rounded-xl font-bold text-lg hover:scale-105 transition">
                    ✨ Crear Nueva Carta
                </button>
            </div>
        </div>
    </div>

    <script>
        let paginaActual = 1;
        let puntosMapa = [];
        let mapa;
        let dibujando = false;
        let ctx;

        function abrirCarta() {
            const de = document.getElementById('deNombre').value || 'Alguien especial';
            const para = document.getElementById('paraNombre').value || 'Tú';
            document.getElementById('nombreRemitente').textContent = de;
            document.getElementById('nombreDestino').textContent = para;
            
            // Confeti premium
            confetti({
                particleCount: 150,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#ec4899', '#8b5cf6', '#3b82f6', '#22d3ee', '#fbbf24']
            });
            
            document.getElementById('pantalla1').classList.add('hidden');
            document.getElementById('pantalla2').classList.remove('hidden');
            initMapa();
            initCanvas();
        }

        function mostrarPagina(num) {
            document.getElementById('pagina1').classList.toggle('hidden', num!== 1);
            document.getElementById('pagina2').classList.toggle('hidden', num!== 2);
            document.getElementById('btnPag1').classList.toggle('bg-white/50', num!== 1);
            document.getElementById('btnPag1').classList.toggle('bg-white', num === 1);
            document.getElementById('btnPag2').classList.toggle('bg-white/50', num!== 2);
            document.getElementById('btnPag2').classList.toggle('bg-white', num === 2);
        }

        function initMapa() {
            mapa = L.map('mapa').setView([19.4326, -99.1332], 5);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(mapa);
            
            mapa.on('click', function(e) {
                if (puntosMapa.length < 2) {
                    puntosMapa.push(e.latlng);
                    L.marker(e.latlng).addTo(mapa);
                    
                    if (puntosMapa.length === 2) {
                        const distancia = mapa.distance(puntosMapa[0], puntosMapa[1]) / 1000;
                        document.getElementById('distanciaTexto').textContent = `💕 Nos separan ${distancia.toFixed(1)} km pero estamos conectados 💕`;
                        L.polyline(puntosMapa, {color: '#ec4899', weight: 3}).addTo(mapa);
                    }
                }
            });
        }

        function initCanvas() {
            const canvas = document.getElementById('canvas');
            ctx = canvas.getContext('2d');
            ctx.strokeStyle = '#1e293b';
            ctx.lineWidth = 3;
            ctx.lineCap = 'round';

            canvas.addEventListener('mousedown', () => dibujando = true);
            canvas.addEventListener('mouseup', () => { dibujando = false; ctx.beginPath(); });
            canvas.addEventListener('mousemove', dibujar);
            
            // Touch para móvil
            canvas.addEventListener('touchstart', (e) => { dibujando = true; });
            canvas.addEventListener('touchend', () => { dibujando = false; ctx.beginPath(); });
            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                const touch = e.touches[0];
                const rect = canvas.getBoundingClientRect();
                dibujar({ offsetX: touch.clientX - rect.left, offsetY: touch.clientY - rect.top });
            });
        }

        function dibujar(e) {
            if (!dibujando) return;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.offsetX, e.offsetY);
        }

        function limpiarCanvas() {
            ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
        }

        function cerrarCarta() {
            document.getElementById('pantalla2').classList.add('hidden');
            document.getElementById('pantalla3').classList.remove('hidden');
            
            // Confeti final
            setTimeout(() => {
                confetti({ particleCount: 200, spread: 160, origin: { y: 0.6 } });
            }, 300);
        }

        function compartirLink() {
            const link = window.location.href;
            navigator.clipboard.writeText(link);
            alert('¡Link copiado! 💙 Compártelo con tu persona especial');
        }

        // Cargar canción de YouTube/Spotify
        document.getElementById('linkCancion').addEventListener('change', function(e) {
            const url = e.target.value;
            const player = document.getElementById('playerCancion');
            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                const videoId = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
                player.innerHTML = `<iframe width="100%" height="200" src="https://www.youtube.com/embed/${videoId}" frameborder="0" allowfullscreen class="rounded-xl"></iframe>`;
            } else if (url.includes('spotify.com')) {
                const trackId = url.split('track/')[1]?.split('?')[0];
                player.innerHTML = `<iframe src="https://open.spotify.com/embed/track/${trackId}" width="100%" height="200" frameborder="0" class="rounded-xl"></iframe>`;
            }
        });
    </script>
</body>
</html>
